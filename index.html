<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#142019">
  <meta name="description" content="POF AIO is an Alt1-ready all-in-one Player-Owned Farm and Ranch Out of Time assistant for RuneScape 3.">
  <title>POF AIO</title>
  <link rel="icon" href="icon.png">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="app-header">
    <div class="brand">
      <img src="icon.png" alt="">
      <div><span>RuneScape 3 Alt1 app</span><h1>POF AIO</h1></div>
    </div>
    <div class="header-actions">
      <span id="environment" class="environment">Loading…</span>
      <span class="version">v<span id="app-version">2.6.3</span></span>
      <a id="add-app" class="secondary compact" hidden>Add to Alt1</a>
      <button id="reset-button" class="ghost compact">Settings</button>
    </div>
  </header>

  <nav class="tabs" aria-label="Application sections">
    <button data-tab="dashboard" class="active">Dashboard</button>
    <button data-tab="scanner">Scan Animal</button>
    <button data-tab="animals">Animals</button>
    <button data-tab="pens">Pens</button>
    <button data-tab="breeding">Breeding</button>
    <button data-tab="ideal-pairs">Ideal pairs</button>
    <button data-tab="disease">Disease</button>
    <button data-tab="log">Breeding log</button>
    <button data-tab="buyers">Buyers</button>
    <button data-tab="timers">Timers</button>
    <button data-tab="reference">Reference</button>
    <button data-tab="settings">Settings</button>
    <button data-tab="credits">Credits</button>
  </nav>

  <main>
    <section id="dashboard" class="tab-panel"></section>
    <section id="scanner" class="tab-panel" hidden></section>
    <section id="animals" class="tab-panel" hidden></section>
    <section id="pens" class="tab-panel" hidden></section>
    <section id="breeding" class="tab-panel" hidden></section>
    <section id="ideal-pairs" class="tab-panel" hidden></section>
    <section id="disease" class="tab-panel" hidden></section>
    <section id="log" class="tab-panel" hidden></section>
    <section id="buyers" class="tab-panel" hidden></section>
    <section id="timers" class="tab-panel" hidden></section>
    <section id="reference" class="tab-panel" hidden></section>
    <section id="settings" class="tab-panel" hidden></section>
    <section id="credits" class="tab-panel" hidden></section>
  </main>

  <footer class="app-footer">Passive screen-reading and planning only. No game input, automation, or client modification.</footer>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script src="vendor/alt1-base.js?v=2.6.3"></script>
  <script src="vendor/alt1-ocr.js?v=2.6.3"></script>
  <script src="vendor/aa_8px_mono_pof.js?v=2.6.3"></script>
  <script src="vendor/aa_12px_mono.js?v=2.6.3"></script>
  <script src="data.js?v=2.6.3"></script>
  <script src="farmdata.js?v=2.6.3"></script>
  <script src="vision.js?v=2.6.3"></script>
  <script src="scanner.js?v=2.6.3"></script>
  <script src="disease.js?v=2.6.3"></script>
  <script src="core.js?v=2.6.3"></script>
  <script src="app.js?v=2.6.3"></script>
</body>
</html>
